<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Budget Calculator</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #74ebd5, #acb6e5);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background-color: #fff;
      padding: 35px 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 450px;
    }
    h2 {
      text-align: center;
      color: #34495e;
      margin-bottom: 25px;
    }
    input, select, button {
      margin: 8px 0;
      padding: 10px;
      width: 100%;
      border-radius: 7px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background-color: #2980b9;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #1c5980;
    }
    ul {
      list-style: none;
      padding-left: 0;
      max-height: 120px;
      overflow-y: auto;
      margin-bottom: 10px;
    }
    li {
      background-color: #ecf0f1;
      padding: 6px 10px;
      margin-bottom: 4px;
      border-radius: 5px;
    }
    #result {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
      font-size: 18px;
    }
    canvas {
      margin-top: 20px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h2>Student Budget Calculator</h2>

    <label>Monthly Income ($):</label>
    <input type="number" id="income" placeholder="Enter your monthly income">

    <label>Expense Name:</label>
    <input type="text" id="expenseName" placeholder="Example: Food">

    <label>Amount ($):</label>
    <input type="number" id="expenseAmount" placeholder="Enter expense amount">

    <label>Category:</label>
    <select id="expenseCategory">
      <option value="Food">Food</option>
      <option value="Study">Study</option>
      <option value="Entertainment">Entertainment</option>
      <option value="Transport">Transport</option>
      <option value="Other">Other</option>
    </select>

    <button onclick="addExpense()">Add Expense</button>

    <h3>Expenses List:</h3>
    <ul id="expenseList"></ul>

    <button onclick="calculateBudget()">Calculate Budget</button>

    <h3 id="result"></h3>

    <canvas id="expenseChart" width="400" height="200"></canvas>
  </div>

  <script>
    let expenses = [];

    function addExpense() {
      const name = document.getElementById('expenseName').value.trim();
      const amount = parseFloat(document.getElementById('expenseAmount').value);
      const category = document.getElementById('expenseCategory').value;

      if (!name || !amount || amount <= 0) {
        alert("Please enter a valid expense name and amount.");
        return;
      }

      expenses.push({name, amount, category});
      document.getElementById('expenseList').innerHTML += `<li>${name} (${category}): $${amount}</li>`;

      document.getElementById('expenseName').value = '';
      document.getElementById('expenseAmount').value = '';
    }

    function calculateBudget() {
      const income = parseFloat(document.getElementById('income').value);
      if (!income || income <= 0) {
        alert("Please enter a valid income.");
        return;
      }

      const totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);
      const remaining = income - totalExpenses;

      document.getElementById('result').innerText = 
        `Total Expenses: $${totalExpenses.toFixed(2)}, Remaining Budget: $${remaining.toFixed(2)}`;

      renderChart();
    }

    function renderChart() {
      const ctx = document.getElementById('expenseChart').getContext('2d');

      // destroy previous chart if exists
      const existingChart = Chart.getChart("expenseChart");
      if (existingChart) existingChart.destroy();

      new Chart(ctx, {
        type: 'pie',
        data: {
          labels: expenses.map(e => `${e.name} (${e.category})`),
          datasets: [{
            data: expenses.map(e => e.amount),
            backgroundColor: [
              '#3498db', '#e74c3c', '#f1c40f', '#2ecc71', 
              '#9b59b6', '#e67e22', '#1abc9c', '#ff6b81'
            ]
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'bottom' },
            tooltip: { enabled: true }
          }
        }
      });
    }
  </script>
</body>
</html>
